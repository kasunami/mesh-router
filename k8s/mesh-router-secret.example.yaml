apiVersion: v1
kind: Secret
metadata:
  name: mesh-router-secret
  namespace: ai-tools
type: Opaque
stringData:
  # Required for production. Do not deploy with placeholder values.
  MESH_ROUTER_DATABASE_URL: postgresql://username:password@meshbrain-db:5432/mesh_router
  MESH_ROUTER_LEASE_TOKEN_SECRET: replace-with-random-secret
  MESH_ROUTER_SWAP_AUTH_TOKEN: replace-with-worker-swap-token
  MESH_ROUTER_ALLOW_DEV_SECRETS: "0"

  # Public callback URL reachable by workers for swap/progress callbacks.
  MESH_ROUTER_ROUTER_PUBLIC_BASE_URL: http://mesh-router.example:4010

  # Optional MeshBench compatibility sync. Keep false unless MeshBench still owns lane discovery.
  MESH_ROUTER_MESHBENCH_BASE_URL: http://meshbench-dashboard:8787
  MESH_ROUTER_MESHBENCH_SYNC_ENABLED: "false"

  # MW state and runtime cache.
  MESH_ROUTER_MW_STATE_DATABASE_URL: postgresql://username:password@meshbrain-db:5432/mesh_router
  MESH_ROUTER_RUNTIME_STATE_REDIS_URL: redis://redis.example:6379/0

  # Routing policy. Comma-separated host IDs that should be treated as opportunistic.
  MESH_ROUTER_OPPORTUNISTIC_HOSTS: ""

  # Optional VLM seed lane. Override only if VLM seeding is enabled.
  MESH_ROUTER_VLM_LANE_HOST_REF: model-router
  MESH_ROUTER_VLM_LANE_NAME: vlm-router
  MESH_ROUTER_VLM_LANE_BASE_URL: http://llama-vision-router.example:4012

# SealedSecret values are cluster-specific. Generate private sealed secrets with kubeseal
# from this template; do not commit private encryptedData to the public repo.
