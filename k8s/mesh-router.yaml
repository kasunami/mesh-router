apiVersion: v1
kind: Service
metadata:
  name: mesh-router
  namespace: ai-tools
  labels:
    app: mesh-router
spec:
  type: LoadBalancer
  # loadBalancerIP: <your-lb-ip>  # Set to your MetalLB/LoadBalancer IP
  selector:
    app: mesh-router
  ports:
    - name: http
      port: 4010
      targetPort: 4010
      protocol: TCP
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-router
  namespace: ai-tools
  labels:
    app: mesh-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mesh-router
  template:
    metadata:
      labels:
        app: mesh-router
      annotations:
        # Deploy hygiene:
        # - Prefer immutable digest refs (registry/repo@sha256:...) or unique tags (git SHA).
        # - Bump this string on every deploy when applying a manifest directly (no GitOps),
        #   so a rollout happens even if the tag string is accidentally reused.
        mesh-router.openai.com/deploy-revision: "__SET_BY_DEPLOY__"
    spec:
      # Optional: pin to a specific node in a private overlay if needed.
      # nodeSelector:
      #   kubernetes.io/hostname: <your-node>
      initContainers:
        - name: migrate-db
          # Deploy hygiene:
          # - Prefer immutable digest refs (registry/repo@sha256:...) OR unique tags (e.g. git SHA).
          # - Never reuse tags for different digests.
          image: registry.example/mesh-router:__SET_BY_DEPLOY__
          # Control-plane safety: always pull when a tag is used.
          # If you deploy by digest (repo@sha256:...), `IfNotPresent` is also safe.
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: mesh-router-secret
          command:
            - python
            - -c
            - |
              from mesh_router.db import init_db
              init_db()
      containers:
        - name: mesh-router
          # Deploy hygiene: prefer digest refs or unique tags; never reuse tags.
          image: registry.example/mesh-router:__SET_BY_DEPLOY__
          # Control-plane safety: always pull when a tag is used.
          # If you deploy by digest (repo@sha256:...), `IfNotPresent` is also safe.
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: mesh-router-secret
          ports:
            - containerPort: 4010
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4010
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4010
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
