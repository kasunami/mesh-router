apiVersion: v1
kind: Service
metadata:
  name: mesh-router
  namespace: ai-tools
  labels:
    app: mesh-router
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.1.47
  selector:
    app: mesh-router
  ports:
    - name: http
      port: 4010
      targetPort: 4010
      protocol: TCP
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-router
  namespace: ai-tools
  labels:
    app: mesh-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mesh-router
  template:
    metadata:
      labels:
        app: mesh-router
    spec:
      # Prefer packserv for control-plane services.
      nodeSelector:
        kubernetes.io/hostname: packserv
      initContainers:
        - name: migrate-db
          image: 10.0.0.2:5000/mesh-router:20260311-swapprobe
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: mesh-router-secret
          command:
            - python
            - -c
            - |
              from mesh_router.db import init_db
              init_db()
      containers:
        - name: mesh-router
          image: 10.0.0.2:5000/mesh-router:20260311-swapprobe
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: mesh-router-secret
          ports:
            - containerPort: 4010
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4010
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4010
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
